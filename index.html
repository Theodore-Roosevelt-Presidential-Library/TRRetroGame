<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Rough Rider — The Theodore Roosevelt Adventure</title>
<!-- Favicon: Theodore Roosevelt (Rough Rider) sprite in a gold medallion -->
<link rel="icon" href="assets/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png" />
<meta name="theme-color" content="#1f3a4a" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="frame">
    <canvas id="game" width="960" height="540"></canvas>
    <!-- TRPL wordmark — links to the Theodore Roosevelt Presidential Library.
         Shown only on intro / chapter-summary screens (toggled by game.js). -->
    <a id="trpl-logo" href="https://www.trlibrary.com/" target="_blank" rel="noopener noreferrer"
       title="Theodore Roosevelt Presidential Library — trlibrary.com" aria-label="Visit the Theodore Roosevelt Presidential Library">
      <img src="assets/trpl_wordmark.svg" alt="Theodore Roosevelt Presidential Library" />
    </a>
    <div id="loading">Loading the Badlands…</div>
  </div>
  <p id="hint">Click the game once, then use the on-screen keys. Press <b>F</b> for fullscreen, <b>M</b> to mute.</p>

  <!-- Shown only on touch phones held in portrait -->
  <div id="rotate-hint">
    <div class="rot">📱</div>
    <div>Rotate your device to landscape<br/>for the best Rough Rider experience.</div>
  </div>

  <!-- Game scripts -->
  <script src="js/data.js"></script>
  <script src="js/assets.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/minigames.js"></script>
  <script src="js/game.js"></script>
  <script src="js/touch.js"></script>
</body>
</html>
