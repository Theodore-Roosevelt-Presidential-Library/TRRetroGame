<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<!-- Discourage Safari/iOS from serving stale CSS/JS. The ?v= query strings below
     are the real cache-buster; bump BUILD (here + on each asset) on every deploy. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Rough Rider — The Theodore Roosevelt Adventure</title>
<!-- Favicon: Theodore Roosevelt (Rough Rider) sprite in a gold medallion -->
<link rel="icon" href="assets/favicon.ico?v=20260620" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=20260620" />
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png?v=20260620" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png?v=20260620" />
<meta name="theme-color" content="#1f3a4a" />
<!-- iOS: allow a chromeless, full-screen launch when added to the Home Screen -->
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Rough Rider" />
<link rel="stylesheet" href="css/style.css?v=20260620" />
</head>
<body>
  <div id="frame">
    <canvas id="game" width="960" height="540"></canvas>
    <!-- TRPL wordmark — links to the Theodore Roosevelt Presidential Library.
         Shown only on intro / chapter-summary screens (toggled by game.js). -->
    <a id="trpl-logo" href="https://www.trlibrary.com/" target="_blank" rel="noopener noreferrer"
       title="Theodore Roosevelt Presidential Library — trlibrary.com" aria-label="Visit the Theodore Roosevelt Presidential Library">
      <img src="assets/trpl_wordmark.svg?v=20260620" alt="Theodore Roosevelt Presidential Library" />
    </a>
    <!-- Completion-reward claim button — shown by game.js only on the ending
         screen after all chapters are cleared. Real link to the Library. -->
    <a id="claim-btn" href="https://www.trlibrary.com/" target="_blank" rel="noopener noreferrer">
      🎟 Claim your free youth ticket
    </a>
    <div id="loading">Loading the Badlands…</div>
  </div>
  <p id="hint">Click the game once, then use the on-screen keys. Press <b>F</b> for fullscreen, <b>M</b> to mute.</p>

  <!-- Shown only on touch phones held in portrait -->
  <div id="rotate-hint">
    <div class="rot">📱</div>
    <div>Rotate your device to landscape<br/>for the best Rough Rider experience.</div>
  </div>

  <!-- Game scripts. Bump ?v=YYYYMMDD(n) on every deploy to defeat Safari caching. -->
  <script src="js/data.js?v=20260620"></script>
  <script src="js/assets.js?v=20260620"></script>
  <script src="js/audio.js?v=20260620"></script>
  <script src="js/sprites.js?v=20260620"></script>
  <script src="js/minigames.js?v=20260620"></script>
  <script src="js/game.js?v=20260620"></script>
  <script src="js/touch.js?v=20260620"></script>
</body>
</html>
